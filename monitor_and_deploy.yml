name: Ultimate Monitor & Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  ultimate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run ultimate monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/ultimate_monitor.py
